<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skynet UGC - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.min.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        .error { color: red; text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Skynet Login</h1>
        <p class="error" id="error-message"></p>
        <form id="login-form">
            <fieldset>
                <label for="username">Username</label>
                <input type="text" placeholder="admin" id="username" name="username" required>
                <label for="password">Password</label>
                <input type="password" placeholder="admin123" id="password" name="password" required>
                <input class="button-primary" type="submit" value="Login">
            </fieldset>
        </form>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
